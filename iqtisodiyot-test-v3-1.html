<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iqtisodiyot Nazariyasi — Test</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e1a;--surface:#111827;--accent:#00e5ff;--accent2:#7c3aed;--correct:#10b981;--wrong:#ef4444;--text:#e2e8f0;--muted:#64748b;--border:#1e293b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 20% 20%,rgba(0,229,255,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(124,58,237,.05) 0%,transparent 50%);}
  .screen{display:none;min-height:100vh;}
  .screen.active{display:flex;flex-direction:column;}
  #homeScreen{align-items:center;justify-content:center;padding:2rem;text-align:center;}
  .logo{font-family:'Unbounded',sans-serif;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:.4rem;}
  .sub{color:var(--muted);font-size:.9rem;margin-bottom:2.5rem;}
  .variants-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:420px;margin-bottom:1.5rem;}
  .v-card{background:var(--surface);border:2px solid var(--border);border-radius:1.2rem;padding:1.4rem 1rem;cursor:pointer;transition:all .2s;text-align:center;}
  .v-card:hover{border-color:var(--accent);background:rgba(0,229,255,.06);}
  .v-card.selected{border-color:var(--accent);background:rgba(0,229,255,.1);}
  .v-letter{font-family:'Unbounded',sans-serif;font-size:2rem;font-weight:900;color:var(--accent);}
  .v-info{font-size:.78rem;color:var(--muted);margin-top:.3rem;}
  .random-row{display:flex;gap:.75rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap;}
  .mode-btn{background:var(--surface);border:2px solid var(--border);color:var(--muted);padding:.6rem 1.2rem;border-radius:2rem;cursor:pointer;font-family:'Manrope',sans-serif;font-size:.85rem;transition:all .2s;}
  .mode-btn.active{border-color:var(--accent2);color:#a78bfa;background:rgba(124,58,237,.1);}
  .start-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0e1a;border:none;padding:1rem 2.8rem;border-radius:2rem;font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 0 30px rgba(0,229,255,.2);}
  .start-btn:hover{transform:scale(1.05);}
  .start-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  #quizScreen{padding:0;}
  .quiz-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10;}
  .q-counter{font-family:'Unbounded',sans-serif;font-size:.8rem;color:var(--accent);white-space:nowrap;}
  .prog-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s;}
  .score-live{font-family:'Unbounded',sans-serif;font-size:.8rem;color:var(--correct);white-space:nowrap;}
  .quiz-body{flex:1;padding:2rem 1.5rem;max-width:700px;margin:0 auto;width:100%;}
  .variant-tag{display:inline-flex;gap:.4rem;align-items:center;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#a78bfa;font-size:.75rem;padding:.25rem .75rem;border-radius:1rem;margin-bottom:1rem;}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:1.8rem;color:#f1f5f9;}
  .opts{display:flex;flex-direction:column;gap:.7rem;}
  .opt-btn{background:var(--surface);border:2px solid var(--border);color:var(--text);padding:.9rem 1.1rem;border-radius:.85rem;text-align:left;cursor:pointer;font-family:'Manrope',sans-serif;font-size:.93rem;line-height:1.5;transition:all .2s;display:flex;align-items:flex-start;gap:.7rem;}
  .opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(0,229,255,.05);}
  .opt-ltr{background:var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:.7rem;font-weight:700;flex-shrink:0;transition:all .2s;}
  .opt-btn.correct{border-color:var(--correct);background:rgba(16,185,129,.08);}
  .opt-btn.correct .opt-ltr{background:var(--correct);color:#fff;}
  .opt-btn.wrong{border-color:var(--wrong);background:rgba(239,68,68,.08);}
  .opt-btn.wrong .opt-ltr{background:var(--wrong);color:#fff;}
  .opt-btn:disabled{cursor:default;}
  .feedback{margin-top:1.2rem;padding:.9rem 1.1rem;border-radius:.85rem;font-size:.88rem;line-height:1.6;display:none;}
  .feedback.correct{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;display:block;}
  .feedback.wrong{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block;}
  .next-btn{margin-top:1.4rem;width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;padding:.95rem;border-radius:.85rem;font-family:'Unbounded',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;display:none;transition:opacity .2s;}
  .next-btn:hover{opacity:.85;}
  #resultScreen{align-items:center;justify-content:center;padding:2rem;text-align:center;}
  .res-emoji{font-size:3.5rem;margin-bottom:.8rem;}
  .res-title{font-family:'Unbounded',sans-serif;font-size:clamp(1.3rem,4vw,1.8rem);font-weight:900;margin-bottom:.4rem;}
  .res-big{font-family:'Unbounded',sans-serif;font-size:clamp(3rem,10vw,5rem);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin:.8rem 0;}
  .res-desc{color:var(--muted);margin-bottom:1.8rem;font-size:.9rem;}
  .res-cards{display:flex;gap:1rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap;}
  .res-card{background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:.9rem 1.3rem;min-width:100px;}
  .res-card .num{font-family:'Unbounded',sans-serif;font-size:1.4rem;font-weight:700;}
  .res-card.c .num{color:var(--correct);}
  .res-card.w .num{color:var(--wrong);}
  .res-card.p .num{color:var(--accent);}
  .res-card .lbl{font-size:.75rem;color:var(--muted);margin-top:.2rem;}
  .res-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
  .restart-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0e1a;border:none;padding:.9rem 2rem;border-radius:2rem;font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:transform .2s;}
  .restart-btn:hover{transform:scale(1.05);}
  .home-btn{background:var(--surface);border:2px solid var(--border);color:var(--text);padding:.9rem 2rem;border-radius:2rem;font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .home-btn:hover{border-color:var(--accent);color:var(--accent);}
  @media(max-width:480px){.quiz-body{padding:1.2rem 1rem;}.q-text{font-size:.98rem;}}
</style>
</head>
<body>

<div id="homeScreen" class="screen active">
  <div class="logo">IQTISODIYOT<br>NAZARIYASI</div>
  <div class="sub">Yakuniy imtihon — variantli test</div>
  <div class="variants-grid">
    <div class="v-card" onclick="selectVariant(this,'A')"><div class="v-letter">A</div><div class="v-info" id="infoA">— savol</div></div>
    <div class="v-card" onclick="selectVariant(this,'B')"><div class="v-letter">B</div><div class="v-info" id="infoB">— savol</div></div>
    <div class="v-card" onclick="selectVariant(this,'C')"><div class="v-letter">C</div><div class="v-info" id="infoC">— savol</div></div>
    <div class="v-card" onclick="selectVariant(this,'D')"><div class="v-letter">D</div><div class="v-info" id="infoD">— savol</div></div>
  </div>
  <div class="random-row">
    <button class="mode-btn" id="modeRandom" onclick="setMode('random')">🔀 Random tartib</button>
    <button class="mode-btn active" id="modeFixed" onclick="setMode('fixed')">📋 Tartibli</button>
  </div>
  <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>Variant tanlang</button>
</div>

<div id="quizScreen" class="screen">
  <div class="quiz-header">
    <div class="q-counter" id="qCounter">1/40</div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="score-live" id="scoreLive">✓ 0</div>
  </div>
  <div class="quiz-body">
    <div class="variant-tag" id="varTag">📋 VARIANT A</div>
    <div class="q-text" id="qText"></div>
    <div class="opts" id="optsGrid"></div>
    <div class="feedback" id="feedbackBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">Keyingisi →</button>
  </div>
</div>

<div id="resultScreen" class="screen">
  <div class="res-emoji" id="resEmoji">🏆</div>
  <div class="res-title" id="resTitle">Ajoyib!</div>
  <div class="res-big" id="resBig">0%</div>
  <div class="res-desc" id="resDesc"></div>
  <div class="res-cards">
    <div class="res-card c"><div class="num" id="rcCorrect">0</div><div class="lbl">To'g'ri</div></div>
    <div class="res-card w"><div class="num" id="rcWrong">0</div><div class="lbl">Noto'g'ri</div></div>
    <div class="res-card p"><div class="num" id="rcPct">0%</div><div class="lbl">Ball</div></div>
  </div>
  <div class="res-btns">
    <button class="home-btn" onclick="goHome()">🏠 Bosh sahifa</button>
    <button class="restart-btn" onclick="restartSame()">🔄 Qaytadan</button>
  </div>
</div>

<script>
const ALL = [
  // ===== MIKROIQTISODIYOT MASALALAR =====
  {t:"masala",q:"FC=60,000 UZS, VC=90,000 UZS, Q=3,000 dona. AFC=?",a:"AFC = FC/Q = 60,000/3,000 = 20 UZS",w:["AFC = 30 UZS","AFC = 50 UZS","AFC = 15 UZS"]},
  {t:"masala",q:"ATC=$10, P=$14, Q=80. Foyda=?",a:"Foyda = (P-ATC)×Q = (14-10)×80 = $320",w:["Foyda = $400","Foyda = $280","Foyda = $240"]},
  {t:"masala",q:"ATC=$7, P=$6, Q=65. Natija=?",a:"Foyda = (6-7)×65 = -$65 (zarar)",w:["Foyda = +$65","Zarar = -$130","Foyda = +$130"]},
  {t:"masala",q:"TC=50Q+2Q², P=$250. Foydani max qiluvchi Q=?",a:"MR=MC → 250=50+4Q → Q=50",w:["Q=40","Q=60","Q=25"]},
  {t:"masala",q:"TC=50Q+2Q², Q=50. TR=?",a:"TR = 250×50 = $12,500",w:["TR=$10,000","TR=$15,000","TR=$8,000"]},
  {t:"masala",q:"TC=50Q+2Q², Q=50. TC=?",a:"TC = 50(50)+2(50²) = 2,500+5,000 = $7,500",w:["TC=$6,000","TC=$8,000","TC=$5,000"]},
  {t:"masala",q:"TC=50Q+2Q², Q=50, TR=$12,500, TC=$7,500. Foyda=?",a:"Foyda = 12,500-7,500 = $5,000",w:["Foyda=$4,000","Foyda=$6,000","Foyda=$3,000"]},
  {t:"masala",q:"TC=40Q+Q², P=$240. Foydani max qiluvchi Q=?",a:"MR=MC → 240=40+2Q → Q=100",w:["Q=80","Q=120","Q=60"]},
  {t:"masala",q:"TC=40Q+Q², Q=100. TR=?",a:"TR = 240×100 = $24,000",w:["TR=$20,000","TR=$28,000","TR=$18,000"]},
  {t:"masala",q:"TC=40Q+Q², Q=100. TC=?",a:"TC = 40(100)+100² = 4,000+10,000 = $14,000",w:["TC=$12,000","TC=$16,000","TC=$10,000"]},
  {t:"masala",q:"TC=40Q+Q², TR=$24,000, TC=$14,000. Foyda=?",a:"Foyda = 24,000-14,000 = $10,000",w:["Foyda=$8,000","Foyda=$12,000","Foyda=$6,000"]},
  {t:"masala",q:"Qd=18-2P, Qs=2+2P. Muvozanat narx Pe=?",a:"18-2P=2+2P → 16=4P → Pe=4",w:["Pe=3","Pe=5","Pe=2"]},
  {t:"masala",q:"Qd=18-2P, Qs=2+2P, Pe=4. Muvozanat miqdor Qe=?",a:"Qe = 18-2(4) = 10 dona",w:["Qe=8","Qe=12","Qe=6"]},
  {t:"masala",q:"Qd=10-P, Qs=1+2P. Muvozanat narx Pe=?",a:"10-P=1+2P → 9=3P → Pe=3",w:["Pe=2","Pe=4","Pe=5"]},
  {t:"masala",q:"Qd=10-P, Qs=1+2P, Pe=3. Muvozanat miqdor Qe=?",a:"Qe = 10-3 = 7 dona",w:["Qe=5","Qe=9","Qe=6"]},
  {t:"masala",q:"Qd=180-25P, Qs=-40+30P. Muvozanat narx Pe=?",a:"180-25P=-40+30P → 220=55P → Pe=4 so'm",w:["Pe=3 so'm","Pe=5 so'm","Pe=6 so'm"]},
  {t:"masala",q:"Qd=180-25P, Qs=-40+30P, Pe=4. Muvozanat miqdor Qe=?",a:"Qe = 180-25(4) = 80 dona",w:["Qe=60","Qe=100","Qe=70"]},
  // ===== MIKROIQTISODIYOT NAZARIY =====
  {t:"nazariy",q:"Bozor muvozanat nuqtasi qaysi?",a:"Talab va taklif egri chiziqlari kesishgan nuqta, Qd=Qs bo'ladi",w:["Narx eng yuqori bo'lgan nuqta","Taklif eng ko'p bo'lgan nuqta","Faqat xaridorlar qaror qiladigan nuqta"]},
  {t:"nazariy",q:"Qisqa muddatli o'rtacha o'zgaruvchan xarajatlar (SAVC) nima?",a:"SAVC = TVC/Q (o'zgaruvchan xarajatlar / ishlab chiqarish hajmi)",w:["SAVC = FC/Q","SAVC = TC/Q","SAVC = MC×Q"]},
  {t:"nazariy",q:"Umumiy xarajatlar (TC) nima?",a:"TC = FC + VC (doimiy + o'zgaruvchan xarajatlar)",w:["TC = TR - Foyda","TC = ATC×P","TC = MC + AC"]},
  {t:"nazariy",q:"O'rtacha o'zgaruvchan xarajatlar (AVC) nima?",a:"AVC = TVC/Q",w:["AVC = FC/Q","AVC = TC/P","AVC = MC - AFC"]},
  {t:"nazariy",q:"O'rtacha doimiy xarajatlar (AFC) nima?",a:"AFC = FC/Q",w:["AFC = TC/Q","AFC = VC/Q","AFC = ATC - MC"]},
  {t:"nazariy",q:"ATC formulasi nima?",a:"ATC = TC/Q yoki ATC = AFC + AVC",w:["ATC = FC×Q","ATC = TR/Q","ATC = MC/Q"]},
  {t:"nazariy",q:"Monopolist foydani qachon maksimallashtiradi?",a:"MR=MC bo'lgan ishlab chiqarish hajmida",w:["P=MC bo'lganda","TR eng katta bo'lganda","ATC=P bo'lganda"]},
  {t:"nazariy",q:"Marginal xarajatlar (MC) formulasi?",a:"MC = ΔTC/ΔQ",w:["MC = TC/Q","MC = VC+FC","MC = ATC×Q"]},
  {t:"nazariy",q:"O'rtacha umumiy xarajatlar (ATC) nimaga teng?",a:"ATC = TC/Q = AFC + AVC",w:["ATC = TR/Q","ATC = FC×VC","ATC = MC+TC"]},
  {t:"nazariy",q:"O'rtacha xarajatlar (AC) formulasi?",a:"AC = TC/Q",w:["AC = FC+VC","AC = TR-TC","AC = P×Q"]},
  {t:"nazariy",q:"Marginal xarajatlar (MC) qaysi ifodalarda?",a:"MC = ΔTC/ΔQ",w:["MC = TC/Q","MC = ATC/Q","MC = P-AVC"]},
  {t:"nazariy",q:"Foydani maksimallashtirish sharti?",a:"MR=MC bo'lganda firma foydani maksimallashtiradi",w:["P=ATC bo'lganda","TR=TC bo'lganda","MR=ATC bo'lganda"]},
  {t:"nazariy",q:"Firma MR=MC bo'lgan nuqtada nima qiladi?",a:"Foydani maksimallashtiruvchi miqdorda ishlab chiqaradi",w:["Ishlab chiqarishni to'xtatadi","Narxni oshiradi","Xarajatlarni kamaytiradi"]},
  {t:"nazariy",q:"Ishlab chiqarish omillarining maksimal ishlatilishi nimaga olib keladi?",a:"Ishlab chiqarish imkoniyatlari chegarasiga (PPF) yaqin ishlashga, samaradorlik oshadi",w:["Narxlarning oshishiga","Ishsizlikning ko'payishiga","Monopoliyaning kuchayishiga"]},
  {t:"nazariy",q:"Foydani maksimallashtirish kimlarning manfaatlariga javob beradi?",a:"Aksiyadorlar va firma egalarining manfaatlariga",w:["Faqat davlat manfaatlariga","Iste'molchilar manfaatlariga","Ishchilar manfaatlariga"]},
  {t:"nazariy",q:"Talab egri chizig'ini o'ngga siljituvchi omillar?",a:"Daromad oshishi, o'rinbosar tovar narxining ko'tarilishi, xaridorlar soni ko'payishi",w:["Narxning oshishi","Taklifning kamayishi","Ishlab chiqarish xarajatlarining oshishi"]},
  {t:"nazariy",q:"Tovar narxining tushishiga nima sabab bo'ladi?",a:"Taklifning ortishi yoki talabning kamayishi",w:["Talabning oshishi","Daromadning kamayishi","Monopoliyaning kuchayishi"]},
  {t:"nazariy",q:"Talabning narxsiz omili?",a:"Daromad darajasi, xaridorlar soni, didlar va afzalliklar, kutishlar, o'rinbosar tovarlar narxi",w:["Faqat narx omili","Taklif miqdori","Ishlab chiqarish texnologiyasi"]},
  {t:"nazariy",q:"Taklifning narxsiz omili?",a:"Ishlab chiqarish xarajatlari, texnologiya, soliqlar, subsidiyalar, ishlab chiqaruvchilar soni",w:["Xaridorlar didi","Daromad darajasi","O'rinbosar tovarlar narxi"]},
  {t:"nazariy",q:"Firmaning doimiy xarajatlari nima?",a:"Ishlab chiqarish hajmidan qat'i nazar o'zgarmaydigan xarajatlar: ijara, amortizatsiya, doimiy maosh",w:["Xom ashyo xarajatlari","Energiya xarajatlari","Soatbay ishchilar ish haqi"]},
  {t:"nazariy",q:"Mukammal raqobat bozorining asosiy xususiyatlari?",a:"Ko'p sonli firmalar, gomogen mahsulot, bozorga erkin kirish-chiqish, firma narx oluvchi",w:["Bitta sotuvchi bor","Differensiallangan mahsulot","Bozorga kirish qiyin"]},
  {t:"nazariy",q:"Monopolistik raqobat bozorida tovar qanday?",a:"Differensiallangan, ammo bir-biriga yaqin o'rinbosar tovarlar",w:["Bir xil gomogen tovar","Bitta tovar turi","Davlat belgilaydigan tovar"]},
  {t:"nazariy",q:"Firma uchun eng muhim maqsad?",a:"Foydani maksimallashtirish",w:["Ishlab chiqarishni kamaytirish","Bozorni monopollashtirish","Xarajatlarni oshirish"]},
  {t:"nazariy",q:"Taklifning narxsiz omili (to'liq ro'yxat)?",a:"Resurslar narxi, texnologiya, davlat siyosati (soliq/subsidiya), kelajakka bo'lgan kutishlar",w:["Talabning oshishi","Iste'molchi didi","Xaridorlar soni"]},
  {t:"nazariy",q:"An'anaviy iqtisodiy tizimda ishlab chiqarish qarorlari qanday qabul qilinadi?",a:"An'analar, urf-odatlar va diniy qadriyatlar asosida avloddan avlodga o'tib kelgan tartib bo'yicha",w:["Davlat buyrug'i asosida","Bozor narxi orqali","Xalqaro tashkilotlar yordamida"]},
  {t:"nazariy",q:"Qaysi xususiyat bozor iqtisodiyotiga tegishli emas?",a:"Markazlashtirilgan rejalashtirish",w:["Xususiy mulkchilik","Erkin narx","Raqobat"]},
  {t:"nazariy",q:"Aralash iqtisodiy tizim nima?",a:"Bozor va davlat boshqaruvi elementlarini birlashtirgan iqtisodiy tizim",w:["Faqat bozor mexanizmi","Davlat barcha qarorlarni qabul qiladi","An'analar asosida boshqariladi"]},
  {t:"nazariy",q:"To'liq bandlik, inflyatsiyasizlik, ijtimoiy kafolatlar qaysi tizim afzalliklari?",a:"Rejali (buyruqbozlik) iqtisodiy tizimning rasmiy e'lon qilingan afzalliklari",w:["Bozor iqtisodiyoti","An'anaviy tizim","Aralash tizim"]},
  {t:"nazariy",q:"An'anaviy tizimda qanday mulkchilik mavjud?",a:"Jamoaviy yoki qabila mulkchiligi (yer va resurslar qabila/oilaga tegishli)",w:["Xususiy mulkchilik ustuvor","Davlat mulkchiligi","Aralash mulkchilik"]},
  {t:"nazariy",q:"Qaysi tizimda qishloq xo'jaligi ustuvor, texnologiya past?",a:"An'anaviy iqtisodiy tizim",w:["Bozor iqtisodiyoti","Rejali iqtisodiyot","Aralash iqtisodiyot"]},

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildVariants(){
  const s=shuffle([...ALL]);
  const chunks={A:s.slice(0,40),B:s.slice(40,80),C:s.slice(80,120),D:s.slice(120)};
  return chunks;
}
const VARIANTS=buildVariants();

// Update badges
['A','B','C','D'].forEach(v=>{
  document.getElementById('info'+v).textContent=VARIANTS[v].length+' ta savol';
});

let selV=null,useRandom=false,activeQs=[],curIdx=0,score=0,answered=false,lastV=null;

function selectVariant(el,v){
  document.querySelectorAll('.v-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');selV=v;
  const b=document.getElementById('startBtn');b.disabled=false;b.textContent='Variant '+v+' — Boshlash';
}
function setMode(m){
  useRandom=m==='random';
  document.getElementById('modeRandom').classList.toggle('active',useRandom);
  document.getElementById('modeFixed').classList.toggle('active',!useRandom);
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function startQuiz(){
  if(!selV)return;
  lastV=selV;
  let qs=[...VARIANTS[selV]];
  if(useRandom)qs=shuffle(qs);
  activeQs=qs;curIdx=0;score=0;
  showScreen('quizScreen');renderQ();
}
function renderQ(){
  const q=activeQs[curIdx];answered=false;
  document.getElementById('qCounter').textContent=`${curIdx+1} / ${activeQs.length}`;
  document.getElementById('progFill').style.width=`${(curIdx/activeQs.length)*100}%`;
  document.getElementById('scoreLive').textContent=`✓ ${score}`;
  document.getElementById('varTag').textContent=`📋 VARIANT ${lastV} — ${q.t==='masala'?'🧮 MASALA':'📚 NAZARIY'}`;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('feedbackBox').className='feedback';
  document.getElementById('nextBtn').style.display='none';
  const letters=['A','B','C','D'];
  const opts=shuffle([q.a,...q.w]);
  const grid=document.getElementById('optsGrid');grid.innerHTML='';
  opts.forEach((opt,i)=>{
    const btn=document.createElement('button');btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-ltr">${letters[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click',()=>pick(btn,opt,q.a));grid.appendChild(btn);
  });
}
function pick(clicked,chosen,correct){
  if(answered)return;answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(chosen===correct){
    clicked.classList.add('correct');score++;
    document.getElementById('feedbackBox').className='feedback correct';
    document.getElementById('feedbackBox').textContent="✅ To'g'ri! Yaxshi!";
  }else{
    clicked.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.querySelector('span:last-child').textContent===correct)b.classList.add('correct');});
    document.getElementById('feedbackBox').className='feedback wrong';
    document.getElementById('feedbackBox').textContent=`❌ Noto'g'ri. To'g'ri: ${correct}`;
  }
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('scoreLive').textContent=`✓ ${score}`;
}
function nextQ(){curIdx++;if(curIdx>=activeQs.length)showResult();else renderQ();}
function showResult(){
  showScreen('resultScreen');
  const total=activeQs.length,pct=Math.round((score/total)*100);
  let emoji,title;
  if(pct>=90){emoji='🏆';title="Zo'r natija!";}
  else if(pct>=75){emoji='🎯';title="Yaxshi!";}
  else if(pct>=50){emoji='📚';title="O'rtacha";}
  else{emoji='💪';title="Harakat qiling!";}
  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resBig').textContent=pct+'%';
  document.getElementById('resDesc').textContent=`Variant ${lastV} — ${score}/${total} to'g'ri`;
  document.getElementById('rcCorrect').textContent=score;
  document.getElementById('rcWrong').textContent=total-score;
  document.getElementById('rcPct').textContent=pct+'%';
  document.getElementById('progFill').style.width='100%';
}
function goHome(){
  selV=null;document.querySelectorAll('.v-card').forEach(c=>c.classList.remove('selected'));
  const b=document.getElementById('startBtn');b.disabled=true;b.textContent='Variant tanlang';
  showScreen('homeScreen');
}
function restartSame(){if(!lastV){goHome();return;}selV=lastV;startQuiz();}
</script>
